<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #002D62;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #002D62;
            margin-bottom: 20px;
        }
        p {
            font-size: 16px;
            line-height: 1.5;
        }
        .warning {
            color: #d9534f;
            font-weight: bold;
        }
        .form-group {
            margin: 20px 0;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: calc(100% - 22px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .buttons {
            margin-top: 30px;
        }
        .buttons button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
        }
        .cancel-button {
            background-color: #002D62;
            color: #fff;
        }
        .delete-button {
            background-color: #d9534f;
            color: #fff;
        }
        .delete-button:hover {
            background-color: #c9302c;
        }
        .cancel-button:hover {
            background-color: #001e42;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Delete Account</h1>
        <p class="warning">Warning: This action cannot be undone!</p>
        <p>Are you sure you want to delete your account? This will permanently remove all your data from our system.</p>
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="buttons">
            <button class="cancel-button" onclick="cancelDelete()">Cancel</button>
            <button class="delete-button" onclick="confirmDelete()">Delete Account</button>
        </div>
    </div>

</body>
</html>
